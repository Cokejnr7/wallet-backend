name: Keep Render App Warm

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes
  workflow_dispatch:  # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App Homepage
        run: |
          curl -I ${{ secrets.RENDER_APP_URL }} \
            --max-time 30 \
            --fail \
            --silent \
            --output /dev/null \
            --write-out 'Status: %{http_code}\n'
